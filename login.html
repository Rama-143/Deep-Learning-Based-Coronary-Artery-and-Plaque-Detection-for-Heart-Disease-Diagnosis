<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .wrap{ max-width:520px;margin:50px auto;padding:0 14px; }
    .card{ background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:18px; }
    .input{ width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.25); color:#fff; }
    .btn{ padding:10px 14px; border-radius:12px; border:1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color:#fff; cursor:pointer; }
    .btn:hover{ background: rgba(255,255,255,0.10); }
    .err{ color:#ffb3b3; margin:10px 0; }
    a{ color:#9ad0ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin-top:0;">Login</h1>

      {% if error %}
        <div class="err"><b>{{ error }}</b></div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <label>Username</label><br>
        <input class="input" type="text" name="username" required><br><br>

        <label>Password</label><br>
        <input class="input" type="password" name="password" required><br><br>

        <button class="btn" type="submit">Login</button>
      </form>

      <p style="margin-top:14px;">
        Don’t have an account?
        <a href="{{ url_for('register') }}">Register</a>
      </p>
    </div>
  </div>
</body>
</html>
